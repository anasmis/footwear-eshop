{% extends "base.html" %}
{% block title %}Connexion - E-Shop Django{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="text-center mb-4"><i class="bi bi-box-arrow-in-right"></i> Connexion</h4>
                {% if form.errors %}
                <div class="alert alert-danger">Identifiants invalides. Veuillez réessayer.</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Pas encore de compte ? <a href="{% url 'accounts:register' %}">Inscrivez-vous</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
